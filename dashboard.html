<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f7f9fc;
    }
    .dashboard-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }
    aside {
      background-color: #2c3e50;
      color: white;
      padding: 1rem;
    }
    aside h2 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
    }
    aside a, aside button {
      display: block;
      color: white;
      text-decoration: none;
      margin: 0.5rem 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
    }
    main {
      padding: 2rem;
    }
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }
    .cards {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .card {
      background: white;
      flex: 1;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .form-section {
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside>
      <h2>Admin Panel</h2>
      <a href="#" onclick="showSection('home')">🏠 Dashboard</a>
      <a href="#" onclick="showSection('articles')">📝 Articles</a>
      <a href="#" onclick="showSection('messages')">📨 Messages</a>
      <a href="#" onclick="showSection('content')">⚙️ Site Content</a>
      <a href="home.html" target="_blank">🌐 View Site</a>
      <button onclick="logout()">🚪 Logout</button>
    </aside>
    <main>
      <div id="home" class="section active">
        <h1>Welcome, Admin</h1>
        <div class="cards">
          <div class="card"><h3>Articles</h3><p>Manage blog posts</p></div>
          <div class="card"><h3>Messages</h3><p>User inquiries</p></div>
          <div class="card"><h3>Site Content</h3><p>Header, Footer, Info</p></div>
        </div>
      </div>

      <div id="articles" class="section">
        <h1>Manage Articles</h1>
<form id="article-form">
  <input type="hidden" id="article-id" />
  <label>Title: <input type="text" id="article-title" required /></label><br />
  <label>Author: <input type="text" id="article-author" required /></label><br />
  <label>Content: <textarea id="article-content" required></textarea></label><br />
  <label>Image: <input type="file" id="article-image" accept="image/*" /></label><br />
  <label><input type="checkbox" id="article-published" /> Published</label><br />
  <button type="submit">Save Article</button>
</form>

<div id="article-list" style="margin-top:1rem;"></div>

      </div>

      <div id="messages" class="section">
        <h1>Messages</h1>
        <section id="messages-section" class="dashboard-section hidden">
  <header class="admin-header"><h1>Contact Form Messages</h1></header>
  <div id="message-list"></div>
</section>

      </div>

      <div id="content" class="section">
        <h1>Site Content</h1>
        <!-- Insert content editing form -->
      </div>
    </main>
  </div>

  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function logout() {
      alert("Logging out...");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
