<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Articles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        </header>
    
    <main class="container stories-section">
        <h1>All Articles</h1>
        
        <div class="filter-buttons" style="text-align: center; margin-bottom: 2rem;">

            <button class="button" data-filter="unpublished">Not Published</button>
        </div>

        <div class="articles-container articles-grid">
            </div>
    </main>

    <script src="script.js"></script>   
</body>
</html>
