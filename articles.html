<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Articles - Timothy Sykes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu-overlay" class="menu-overlay"></div>

    <header class="header">
        </header>
    
    <main class="container stories-section">
        <h1 class="full-articles-title">All Articles</h1>
        
        <div class="filter-buttons" style="text-align: center; margin-bottom: 2rem;">

            <button class="button" data-filter="unpublished">Not Published</button>
        </div>

        <div class="articles-container articles-grid">
            </div>
    </main>

    <div id="mobile-menu" class="mobile-menu">
        </div>

    <script src="script.js"></script>   
</body>
</html>
