<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Article</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-portal">
    <div class="admin-dashboard-layout">
        <aside class="admin-sidebar">
            <a href="home.html" class="brand-logo">
                <img src="img/Logo.png" alt="Logo">
            </a>
            <nav>
                <a href="dashboard.html" class="admin-nav-link">Dashboard</a>
                <a href="edit-article.html" class="admin-nav-link active">Manage Article</a>
                <a href="home.html" target="_blank" class="admin-nav-link">View Site</a>
            </nav>
            <button id="logout-btn" class="admin-nav-link logout-btn">Logout</button>
        </aside>

        <main class="admin-main-content">
            <header class="admin-header">
                <h1 id="form-title">Add New Article</h1>
            </header>
            
            <section class="edit-form-container">
                <form id="edit-article-form" class="cf-form">
                    <input type="hidden" id="article-id">
                    <div class="cf-group"><label for="title">Title</label><input type="text" id="title" required></div>
                    <div class="cf-group"><label for="date">Date</label><input type="date" id="date" required></div>
                    <div class="cf-group"><label for="imageSrc">Image Path (e.g., img/1.jpg)</label><input type="text" id="imageSrc" required></div>
                    <div class="cf-group"><label for="status">Status</label><input type="text" id="status" required></div>
                    <div class="cf-group"><label for="description">Short Description (for cards)</label><textarea id="description" rows="4" required></textarea></div>
                    <div class="cf-group"><label for="fullDescription">Full Article Content</label><textarea id="fullDescription" rows="10" required></textarea></div>
                    <button type="submit" class="btn-primary">Save Article</button>
                    <a href="dashboard.html" style="text-align: center; margin-top: 1rem; display: block; color: var(--admin-text-secondary);">Cancel</a>
                </form>
            </section>
        </main>
    </div>
    <script src="admin.js"></script>
</body>
</html>
